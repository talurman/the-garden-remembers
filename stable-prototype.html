<script type="module">

// ---- SAFE AUDIO CONTEXT (shared, avoids redeclare & srcdoc errors)
window.__parkAudioCtx = window.__parkAudioCtx || null;
function getAudioCtx(){
  if(!window.__parkAudioCtx){
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if(Ctx) window.__parkAudioCtx = new Ctx();
  }
  return window.__parkAudioCtx;
}

    import * as THREE from 'three';

    // --- AUDIO ---
let _audioCtx = null;
let _masterGain = null;
let _ambient = {src:null, gain:null, oscA:null, oscB:null, lfo:null, started:false};

function ensureAudio(){
  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return null;
    if(!_audioCtx) _audioCtx = new AC();
    if(_audioCtx.state === 'suspended') _audioCtx.resume();
    if(!_masterGain){
      _masterGain = _audioCtx.createGain();
      _masterGain.gain.value = 0.28;
      _masterGain.connect(_audioCtx.destination);
    }
    return _audioCtx;
  }catch(e){ return null; }
}

function startAmbientMusic(){
  const ctx = ensureAudio();
  if(!ctx || _ambient.started) return;
  _ambient.started = true;

  const g = ctx.createGain();
  g.gain.value = 0.06;  // very subtle
  g.connect(_masterGain);

  // A soft 2-osc pad + gentle LFO for movement
  const o1 = ctx.createOscillator(); o1.type='sine';
  const o2 = ctx.createOscillator(); o2.type='triangle';
  const lfo = ctx.createOscillator(); lfo.type='sine';
  const lfoGain = ctx.createGain(); lfoGain.gain.value = 6; // detune cents
  lfo.connect(lfoGain); lfoGain.connect(o2.detune);

  o1.connect(g); o2.connect(g);

  const base = 110; // A2
  const chords = [
    [base*1.0, base*1.25],      // A + C#
    [base*0.89, base*1.12],     // G + B
    [base*0.75, base*1.0],      // E + A
    [base*0.84, base*1.06],     // F# + A#
  ];
  let ci = 0;
  function setChord(i){
    const [f1,f2]=chords[i%chords.length];
    o1.frequency.setTargetAtTime(f1, ctx.currentTime, 0.2);
    o2.frequency.setTargetAtTime(f2, ctx.currentTime, 0.2);
  }
  setChord(ci);

  o1.start(); o2.start(); lfo.start();
  _ambient = {gain:g, oscA:o1, oscB:o2, lfo:lfo, started:true};

  setInterval(()=>{ try{ ci=(ci+1)%chords.length; setChord(ci);}catch(e){} }, 12000);
}

function playSound(name='click'){
  const ctx = ensureAudio();
  if(!ctx) return;

  // ensure ambient starts once user is interacting
  startAmbientMusic();

  const t = ctx.currentTime;
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.connect(g); g.connect(_masterGain);

  // Tiny palette
  if(name==='click'){ o.type='square'; o.frequency.setValueAtTime(520,t); g.gain.setValueAtTime(0.08,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.08); }
  else if(name==='step'){ o.type='sine'; o.frequency.setValueAtTime(160,t); g.gain.setValueAtTime(0.06,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.10); }
  else if(name==='success'){ o.type='triangle'; o.frequency.setValueAtTime(740,t); g.gain.setValueAtTime(0.08,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.16); }
  else if(name==='error'){ o.type='sawtooth'; o.frequency.setValueAtTime(180,t); g.gain.setValueAtTime(0.07,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.20); }
  else { o.type='sine'; o.frequency.setValueAtTime(440,t); g.gain.setValueAtTime(0.05,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.12); }

  o.start(t);
  o.stop(t+0.25);
}

// Kick audio resume/ambient on first gesture
window.addEventListener('pointerdown', ()=>{ ensureAudio(); startAmbientMusic(); }, {once:false});
window.addEventListener('keydown', ()=>{ ensureAudio(); startAmbientMusic(); }, {once:false});

// --- SCENE SETUP ---

        }

      } catch(e) {}
    };

<script type="module">
    import * as THREE from 'three';

    // --- ROBUST AUDIO ENGINE ---
    class SoundSystem {
        constructor() {
            this.ctx = null;
            this.masterGain = null;
            this.voiceOsc = null;
            this.voiceGain = null;
            this.lfo = null;
            this.isPlaying = false;
        }

        init() {
            if (this.ctx) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            this.ctx = new AudioContext();
            this.masterGain = this.ctx.createGain();
            this.masterGain.connect(this.ctx.destination);
            this.setupAmbience();
            this.isPlaying = true;
        }

        setupAmbience() {
            this.voiceOsc = this.ctx.createOscillator();
            this.voiceOsc.type = 'sawtooth';
            this.voiceOsc.frequency.value = 150;
            this.lfo = this.ctx.createOscillator();
            this.lfo.type = 'sine';
            this.lfo.frequency.value = 4;
            const lfoGain = this.ctx.createGain();
            lfoGain.gain.value = 100;
            this.lfo.connect(lfoGain);
            lfoGain.connect(this.voiceOsc.frequency);
            const filter = this.ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 300;
            this.voiceGain = this.ctx.createGain();
            this.voiceGain.gain.value = 0.0;
            this.voiceOsc.connect(filter);
            filter.connect(this.voiceGain);
            this.voiceGain.connect(this.masterGain);
            this.voiceOsc.start();
            this.lfo.start();
        }

        setProximity(dist) {
            if (!this.ctx) return;
            const maxDist = 12;
            let vol = 1 - (Math.min(dist, maxDist) / maxDist);
            vol = Math.pow(vol, 2);
            const jitter = 0.8 + Math.sin(this.ctx.currentTime * 2) * 0.2;
            this.voiceGain.gain.setTargetAtTime(vol * 0.8 * jitter, this.ctx.currentTime, 0.1);
        }

        boostVolumeTemporarily() {
            if (!this.ctx) return;
            const current = this.voiceGain.gain.value;
            this.voiceGain.gain.cancelScheduledValues(this.ctx.currentTime);
            this.voiceGain.gain.setValueAtTime(current, this.ctx.currentTime);
            this.voiceGain.gain.linearRampToValueAtTime(1.5, this.ctx.currentTime + 0.5);
            this.voiceGain.gain.linearRampToValueAtTime(current, this.ctx.currentTime + 3.0);
        }

        playKnock() {
            if (!this.ctx) return;
            const t = this.ctx.currentTime;
            for(let i=0; i<3; i++) {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.frequency.setValueAtTime(200, t + i*0.4);
                osc.frequency.exponentialRampToValueAtTime(50, t + i*0.4 + 0.1);
                gain.gain.setValueAtTime(0, t + i*0.4);
                gain.gain.linearRampToValueAtTime(1.0, t + i*0.4 + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.01, t + i*0.4 + 0.15);
                osc.connect(gain);
                gain.connect(this.masterGain);
                osc.start(t + i*0.4);
                osc.stop(t + i*0.4 + 0.2);
            }
        }

        playSiren() {
            if (!this.ctx) return;
            const t = this.ctx.currentTime;
            const osc = this.ctx.createOscillator();
            const g = this.ctx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(600, t);
            osc.frequency.linearRampToValueAtTime(900, t + 0.6);
            osc.frequency.linearRampToValueAtTime(600, t + 1.2);
            osc.frequency.linearRampToValueAtTime(900, t + 1.8);
            osc.frequency.linearRampToValueAtTime(600, t + 2.4);
            g.gain.value = 0.2;
            osc.connect(g); g.connect(this.masterGain);
            osc.start(); osc.stop(t+3);
        }
        
        playUI() {
             if (!this.ctx) return;
             const t = this.ctx.currentTime;
             const osc = this.ctx.createOscillator();
             const g = this.ctx.createGain();
             osc.frequency.setValueAtTime(400, t);

    const dTop = new THREE.Mesh(new THREE.CylinderGeometry(1.25, 1.25, 0.2, 32), mats.door); dTop.rotation.x=Math.PI/2; dTop.position.y=3;

            document.getElementById('choice-modal').classList.add('hidden');
            handleAction(btn.dataset.action);
        };
    });

        __sendDecision(type);
        if(type === 'knock') {
            state = 'animating';
            handGroup.visible = true;
            const kInt = setInterval(() => { handGroup.position.z = -0.5 - Math.sin(Date.now() * 0.02) * 0.2; }, 16);
            audio.playKnock();
            setTimeout(() => {
                clearInterval(kInt);
                handGroup.visible = false;
                showToast("אין תשובה...");
                setTimeout(() => { state='playing'; player.z += 2; cooldown=2; }, 1000);
            }, 1200);
        } else if(type === 'listen') {
            audio.boostVolumeTemporarily();
            showToast("זה נשמע כמו ויכוח סוער...");
            state='playing'; cooldown=2;
        } else if(type === 'ignore') {
            state = 'resolved';
            endGame("הלכת משם", "מקווה שהכל בסדר שם...");
        } else if(type === 'call') {
            state = 'animating';
            const phone = document.getElementById('phone-container');
            phone.classList.add('active');
            setTimeout(() => {
                phone.classList.remove('active');
                state = 'turning';
                const startRot = player.rot;
                const targetRot = player.rot + Math.PI;
                let progress = 0;
                const turnInt = setInterval(() => {
                    progress += 0.05;
                    player.rot = THREE.MathUtils.lerp(startRot, targetRot, progress);
                    if(progress >= 1) {
                        clearInterval(turnInt);
                        state = 'police_run';
                        audio.playSiren();
                    }
                }, 30);
            }, 3000);
        }
    }

    const clock = new THREE.Clock();
    
    function update(dt) {
        const dist = player.z - (-9);
        if (state === 'playing' || state === 'menu') audio.setProximity(dist);

        if (state === 'playing') {
            if(keys.ArrowUp) player.z -= 3*dt;
            if(keys.ArrowDown) player.z += 3*dt;
            player.z = Math.max(-7, Math.min(10, player.z));
            camera.position.y = 1.6 + Math.sin(Date.now()*0.008)*0.05;
            if(cooldown > 0) cooldown -= dt;
            if(player.z < -6 && cooldown <= 0) {
                state = 'menu';
                menuIndex = 0; updateMenuUI();
                document.getElementById('choice-modal').classList.remove('hidden');
            }
        }

        if (state === 'police_run') {
            police.position.z -= 10 * dt; 
            police.children.forEach((c, i) => { c.position.y = Math.abs(Math.sin(Date.now()*0.015 + i))*0.2; });
            if(police.position.z < -5) {
                state = 'resolved';
                endGame("המשטרה הגיעה", "דיווחת בזמן.");
            }
        }
        camera.position.x = player.x; camera.position.z = player.z; camera.rotation.y = player.rot;
    }

    function animate() { requestAnimationFrame(animate); update(Math.min(clock.getDelta(), 0.05)); renderer.render(scene, camera); }
    window.onresize = () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
    animate();
</script>

    class SoundSystem {
        constructor() {

        init() {
            if (this.ctx) return;
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.masterGain = this.ctx.createGain(); this.masterGain.connect(this.ctx.destination);

        setupHeavyBreathing() {
            const bufferSize = 2 * this.ctx.sampleRate;
            const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

            lfo.connect(lfoVolGain); lfoVolGain.connect(this.breathGain.gain);

            filter.frequency.value = 600; 

            noise.connect(filter); filter.connect(this.breathGain); 
            this.breathGain.connect(this.masterGain);

    const c2 = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.3, 1.5), mats.cushion); c2.position.set(2, 0.15, -2); c2.castShadow=true; scene.add(c2);

    // STRING LIGHTS
    for(let i=0; i<10; i++) {
        const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.08), mats.bulb);
        bulb.position.set(-3.5 + i*0.8, 3.5 + Math.sin(i)*0.3, -4.7);
        scene.add(bulb);
        if(i%3===0) { const pl = new THREE.PointLight(0xFFF8DC, 0.4, 4); pl.position.copy(bulb.position); scene.add(pl); }
    }

    // CHARACTER
    const charGrp = new THREE.Group();
    const charBody = new THREE.Mesh(new THREE.SphereGeometry(0.6, 16, 16), mats.charClothes); charBody.position.y = 0.6; charBody.scale.set(1, 1.2, 1);
    
    const charHeadGroup = new THREE.Group(); charHeadGroup.position.y = 1.4;
    const charHead = new THREE.Mesh(new THREE.SphereGeometry(0.45, 16, 16), mats.charSkin);
    
    // Eyes & Tears (No mouth)
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.05), new THREE.MeshBasicMaterial({color:0x222})); eyeL.position.set(-0.15, 0.1, 0.4);
    const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.05), new THREE.MeshBasicMaterial({color:0x222})); eyeR.position.set(0.15, 0.1, 0.4);
    const tearL = new THREE.Mesh(new THREE.CapsuleGeometry(0.03, 0.15), mats.tear); tearL.position.set(-0.15, -0.05, 0.42);
    const tearR = new THREE.Mesh(new THREE.CapsuleGeometry(0.03, 0.15), mats.tear); tearR.position.set(0.15, -0.05, 0.42);
    
    charHead.add(eyeL, eyeR, tearL, tearR);
    charHeadGroup.add(charHead); charHeadGroup.rotation.x = 0.6; // Head down
    
    // Arms
    const armGeo = new THREE.CapsuleGeometry(0.15, 0.6);
    const armL = new THREE.Mesh(armGeo, mats.charClothes); armL.position.set(-0.5, 0.8, 0.2); armL.rotation.x = -Math.PI/2; armL.rotation.z = 0.5;
    const armR = new THREE.Mesh(armGeo, mats.charClothes); armR.position.set(0.5, 0.8, 0.2); armR.rotation.x = -Math.PI/2; armR.rotation.z = -0.5;

    charGrp.add(charBody, charHeadGroup, armL, armR);
    charGrp.position.set(0, 0, -2); charGrp.rotation.y = Math.PI; // Back to player
    charGrp.traverse(o=>{if(o.isMesh)o.castShadow=true;}); scene.add(charGrp);

    // EMOJI SPRITE FUNCTION
    function createEmojiSprite(emojiChar) {
        const canvas = document.createElement('canvas');
        canvas.width = 128; canvas.height = 128;
        const ctx = canvas.getContext('2d');
        ctx.font = "80px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(emojiChar, 64, 64);
        const tex = new THREE.CanvasTexture(canvas);
        const mat = new THREE.SpriteMaterial({map: tex});
        const sprite = new THREE.Sprite(mat);
        sprite.scale.set(1, 1, 1);
        return sprite;

    const bottle = new THREE.Mesh(new THREE.CapsuleGeometry(0.15, 0.5), mats.bottle);
    bottle.position.set(1.5, 0.3, 0); bottle.castShadow=true; scene.add(bottle);
    const phone = new THREE.Group();
    const pPart1 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.05, 0.5), mats.phone);
    const pPart2 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.05, 0.5), mats.phone); pPart2.position.x = 0.35; pPart2.rotation.z = 0.2;
    phone.add(pPart1, pPart2); phone.position.set(-1.5, 0.03, 1); scene.add(phone);

    // LIGHTING
    const mainLight = new THREE.PointLight(0xFFDAB9, 1.0, 15); mainLight.position.set(0, 4, 2); mainLight.castShadow=true; scene.add(mainLight);
    scene.add(new THREE.AmbientLight(0x404040, 1.5));

    // --- LOGIC ---
    let state = 'start', player = { x: 0, z: 7, rot: 0 }, cooldown = 0, menuIndex = 0;
    const keys = {};

    window.addEventListener('keydown', (e) => {
        keys[e.key] = true;
        if (e.key === 'Enter') handleEnter();
        if (state === 'menu') handleMenuNav(e.key);
    });
    window.addEventListener('keyup', (e) => keys[e.key] = false);

    document.getElementById('btn-start').onclick = handleEnter;

    function handleEnter() {
        if (state === 'start') {
            document.getElementById('start-screen').classList.add('hidden');
            state = 'playing'; audio.init();
        } else if (state === 'menu') {
            const btns = document.querySelectorAll('.choice-btn');
            document.getElementById('choice-modal').classList.add('hidden');
            handleAction(btns[menuIndex].dataset.action);
        } else if (state === 'resolved') {
            location.reload();
        }
    }

    function handleMenuNav(k) {
        if (k === 'ArrowRight') { menuIndex = (menuIndex + 1) % 5; updateMenuUI(); audio.playTone(300, 0.05); }
        if (k === 'ArrowLeft') { menuIndex = (menuIndex + 4) % 5; updateMenuUI(); audio.playTone(250, 0.05); }
    }

    function updateMenuUI() {
        const btns = document.querySelectorAll('.choice-btn');
        btns.forEach(b => b.classList.remove('selected'));
        btns[menuIndex].classList.add('selected');
    }
    document.querySelectorAll('.choice-btn').forEach((button, index) => {
        button.addEventListener('click', () => {
            if(state !== 'menu') return;
            menuIndex = index;
            updateMenuUI();

        });

    function showToast(msg) {

    function endGame(msg) {
        setTimeout(()=>{
            document.getElementById('end-desc').innerText = msg;
            document.getElementById('end-overlay').classList.add('visible');
            state = 'resolved';
        }, 1500);
    }

    function showFloatingEmoji(char) {
        const spr = createEmojiSprite(char);
        spr.position.copy(charGrp.position);
        spr.position.y += 1.8;
        scene.add(spr);
        // Float up and fade
        let ly = spr.position.y;
        const int = setInterval(()=>{
            ly += 0.01; spr.position.y = ly;
            spr.material.opacity -= 0.01;
            if(spr.material.opacity <= 0) { clearInterval(int); scene.remove(spr); }
        }, 30);
    }

    function handleAction(type){
        __sendDecision(type);
        state = 'animating';
        
        if(type === 'help') {
            showToast("עזרה שקטה...");
            let p=0; const startRot = charGrp.rotation.y;
            const int = setInterval(()=>{
                p+=0.02;
                charGrp.rotation.y = THREE.MathUtils.lerp(startRot, Math.PI*2, p);
                charHeadGroup.rotation.x = THREE.MathUtils.lerp(0.6, 0, p);
                if(p>0.8 && p<0.83) showFloatingEmoji("💖"); 
                mainLight.intensity = THREE.MathUtils.lerp(1.0, 1.5, p);
                if(p>=1) { clearInterval(int); endGame("הוא הרגיש את החום שלך."); }
            }, 30);

        } else if(type === 'touch') {
            showToast("הוא לא רוצה מגע.");
            audio.playGasp();
            let p=0; const startZ = charGrp.position.z;
            const int = setInterval(()=>{
                p+=0.05;
                if(p<1.0) { // Turn & Push
                    charGrp.rotation.y = THREE.MathUtils.lerp(Math.PI, Math.PI*2, p);
                    armL.rotation.x = -1.5; armR.rotation.x = -1.5;
                    armL.position.z = 0.5 + Math.sin(p*3)*0.2;
                } else if (p < 2.0) { // Push back player
                    player.z += 0.1;
                } else { // Return to shell
                    charGrp.rotation.y = THREE.MathUtils.lerp(Math.PI*2, Math.PI, (p-2));
                    armL.rotation.x = -Math.PI/2; armR.rotation.x = -Math.PI/2;
                }
                if(p>=3.0) { clearInterval(int); showFloatingEmoji("😣"); endGame("הטרדת את מנוחתו."); }
            }, 30);

        } else if(type === 'water') {
            showToast("השארת מים.");
            let p=0; const bStart = bottle.position.clone(); const bEnd = new THREE.Vector3(0, 0.5, -1.2);
            const int = setInterval(()=>{
                p+=0.02;
                if(p<0.5) {
                    bottle.position.lerpVectors(bStart, bEnd, p*2);
                    charGrp.rotation.y = THREE.MathUtils.lerp(Math.PI, Math.PI*2, p*2);
                } else {
                    if(p>0.51 && p<0.54) showFloatingEmoji("🥤");
                    armR.rotation.x = -1.5;
                    bottle.position.y = THREE.MathUtils.lerp(0.5, 1.2, (p-0.5)*2);
                }
                if(p>=1) { clearInterval(int); endGame("הוא שתה ונרגע."); }
            }, 30);

        } else if(type === 'call') {
            const ph = document.getElementById('phone-container');
            ph.classList.add('active');
            setTimeout(()=>{
                document.getElementById('msg1').classList.add('show');
                setTimeout(()=>{
                    document.getElementById('msg2').classList.add('show');
                    setTimeout(()=>{
                        ph.classList.remove('active');
                        endGame("הדיווח התקבל.");
                    }, 2000);
                }, 2000);
            }, 500);

        } else if(type === 'leave') {
            endGame("החלטת לתת לו מרחב.");
        }
    }

    const clock = new THREE.Clock();
    function update(dt) {
        const dist = Math.hypot(player.x - charGrp.position.x, player.z - charGrp.position.z);
        if (state === 'playing' || state === 'menu') audio.setProximity(dist);

        // Character Breathing / Sobbing Animation
        charBody.scale.y = 1.0 + Math.sin(Date.now() * 0.005) * 0.03; // Heavy breathing
        charGrp.position.y = Math.sin(Date.now() * 0.01) * 0.01; // Slight tremble
        charHeadGroup.rotation.z = Math.sin(Date.now() * 0.003) * 0.05; // Head wobble

        if (state === 'playing') {
            if(keys.ArrowUp) player.z -= 2.5*dt; if(keys.ArrowDown) player.z += 2.5*dt;
            player.z = Math.max(-1, Math.min(7, player.z));
            camera.position.y = 1.6 + Math.sin(Date.now()*0.005)*0.04;
            if(cooldown > 0) cooldown -= dt;
            if(dist < 2.5 && cooldown <= 0) {
                state = 'menu'; menuIndex = 0; updateMenuUI();
                document.getElementById('choice-modal').classList.remove('hidden');
            }
        }
        camera.position.x = player.x; camera.position.z = player.z;
    }

    function animate() { requestAnimationFrame(animate); update(Math.min(clock.getDelta(), 0.05)); renderer.render(scene, camera); }
    window.onresize = () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
    animate();
</script>

<script type="module">
    import * as THREE from 'three';

    // --- INTENSE AUDIO ENGINE ---
    class SoundSystem {
        constructor() {
            this.ctx = null; this.masterGain = null;
            this.chaosInterval = null;
            this.cryOsc = null; this.cryGain = null;
        }
        init() {
            if (this.ctx) return;
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.masterGain = this.ctx.createGain(); this.masterGain.connect(this.ctx.destination);
            this.startChaos();
        }
        
        startChaos() {
            this.cryOsc = this.ctx.createOscillator(); this.cryOsc.type = 'sine'; this.cryOsc.frequency.value = 250;
            const cryLFO = this.ctx.createOscillator(); cryLFO.frequency.value = 3;
            const cryLFOGain = this.ctx.createGain(); cryLFOGain.gain.value = 30;
            cryLFO.connect(cryLFOGain); cryLFOGain.connect(this.cryOsc.frequency);
            this.cryGain = this.ctx.createGain(); this.cryGain.gain.value = 0.1;
            this.cryOsc.connect(this.cryGain); this.cryGain.connect(this.masterGain);
            this.cryOsc.start(); cryLFO.start();

            this.chaosInterval = setInterval(() => {
                if (Math.random() > 0.4) {
                    this.playNasalLaugh();
                    setTimeout(() => this.playNasalLaugh(), 120);
                    if(Math.random() > 0.6) setTimeout(() => this.playNasalLaugh(), 250);
                }
            }, 500);
        }

        playNasalLaugh() {
            const t = this.ctx.currentTime;
            const osc = this.ctx.createOscillator(); osc.type = 'sawtooth';
            const baseFreq = 500 + Math.random() * 300;
            osc.frequency.setValueAtTime(baseFreq, t);
            osc.frequency.linearRampToValueAtTime(baseFreq + 100, t + 0.15);
            const g = this.ctx.createGain();
            g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.15, t + 0.02); g.gain.linearRampToValueAtTime(0, t + 0.15);
            osc.connect(g); g.connect(this.masterGain);
            osc.start(t); osc.stop(t + 0.15);
        }

        stopChaos() {
            if (this.chaosInterval) clearInterval(this.chaosInterval);
            if (this.cryOsc) { this.cryOsc.stop(); this.cryOsc = null; }
        }

        setIntensity(dist) {
            if (!this.ctx) return;
            const maxDist = 15; let vol = 1 - (Math.min(dist, maxDist) / maxDist);
            this.masterGain.gain.setTargetAtTime(vol * 1.2, this.ctx.currentTime, 0.1);
        }

        playTone(freq) {
            if (!this.ctx) return; const t = this.ctx.currentTime;
            const osc = this.ctx.createOscillator(); osc.frequency.setValueAtTime(freq, t);
            const g = this.ctx.createGain(); g.gain.setValueAtTime(0.1, t); g.gain.linearRampToValueAtTime(0, t+0.3);
            osc.connect(g); g.connect(this.masterGain); osc.start(); osc.stop(t+0.3);
        }

        playCalm() {
            this.stopChaos();
            const osc = this.ctx.createOscillator(); osc.type='sine'; osc.frequency.value = 440;
            const g = this.ctx.createGain(); g.gain.value=0.1; g.gain.linearRampToValueAtTime(0, this.ctx.currentTime+3);
            osc.connect(g); g.connect(this.masterGain); osc.start();
        }
    }
    const audio = new SoundSystem();

    // --- VISUALS ---
    const scene = new THREE.Scene(); scene.background = new THREE.Color(0x4B0082); 
    scene.fog = new THREE.Fog(0x4B0082, 2, 30);
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
    const renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight); renderer.shadowMap.enabled = true;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

        adult: new THREE.MeshStandardMaterial({color: 0xBA55D3}),
        child: new THREE.MeshStandardMaterial({color: 0xFF1493}),
        skin: new THREE.MeshBasicMaterial({color: 0xFFC0CB}),
        faceFeatures: new THREE.MeshBasicMaterial({color: 0x4B0082})
    };

    // ROOM & FLOOR
    const room = new THREE.Mesh(new THREE.CylinderGeometry(12, 12, 8, 32, 1, true), mats.wall); room.position.y = 4; room.receiveShadow=true; scene.add(room);
    const floor = new THREE.Mesh(new THREE.CylinderGeometry(12, 12, 0.5, 32), mats.floor); floor.position.y = -0.25; floor.receiveShadow=true; scene.add(floor);
    for(let i=1; i<6; i++) {
        const ring = new THREE.Mesh(new THREE.RingGeometry(i*2, i*2+0.3, 64), new THREE.MeshBasicMaterial({color:0x800080}));
        ring.rotation.x = -Math.PI/2; ring.position.y = 0.01; scene.add(ring);
    }

    // LIGHTS
    scene.add(new THREE.AmbientLight(0xFF69B4, 0.4));
    const mainLight = new THREE.PointLight(0xFFC0CB, 1, 25); mainLight.position.set(0, 6, 0); mainLight.castShadow=true; scene.add(mainLight);

    // CHARACTERS
    const adults = [];
    const adultGroup = new THREE.Group();

    function createAdult(mats) {
        const grp = new THREE.Group();
        const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.5, 1, 16), mats.adult); torso.position.y = 0.5;
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.3), mats.adult); head.position.y = 1.15;
        const smile = new THREE.Mesh(new THREE.TorusGeometry(0.1, 0.03, 2, 16, Math.PI), mats.faceFeatures); smile.rotation.z = Math.PI; smile.position.set(0,-0.05,0.28);
        const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.05), mats.faceFeatures); eyeL.position.set(-0.12,0.1,0.25);
        const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.05), mats.faceFeatures); eyeR.position.set(0.12,0.1,0.25);
        head.add(smile, eyeL, eyeR);
        const armGeo = new THREE.CapsuleGeometry(0.1, 0.6);
        const rightArm = new THREE.Mesh(armGeo, mats.adult); rightArm.geometry.translate(0, -0.3, 0);
        rightArm.position.set(0.35, 1.0, 0); rightArm.rotation.x = -Math.PI/2 + 0.4;
        rightArm.name = "pointingArm";
        const leftArm = new THREE.Mesh(armGeo, mats.adult); leftArm.position.set(-0.35, 0.7, 0);
        grp.add(torso, head, rightArm, leftArm);
        grp.traverse(o=>{if(o.isMesh)o.castShadow=true;});
        return grp;
    }

    // Increased radius to 3.5 so you can see through gaps
    for(let i=0; i<4; i++) {
        const grp = createAdult(mats);
        const angle = (i / 4) * Math.PI * 2;
        grp.position.set(Math.cos(angle)*3.5, 0, Math.sin(angle)*3.5);
        grp.lookAt(0,0,0);
        grp.userData = { startPos: grp.position.clone(), angle: angle };
        adults.push(grp); adultGroup.add(grp);
    }
    scene.add(adultGroup);

    // CHILD
    const childGrp = new THREE.Group();
    const cBody = new THREE.Mesh(new THREE.CapsuleGeometry(0.2, 0.7), mats.child); cBody.position.y = 0.4;
    const cHead = new THREE.Mesh(new THREE.SphereGeometry(0.22), mats.child); cHead.position.y = 0.85;
    const tearL = new THREE.Mesh(new THREE.CapsuleGeometry(0.02, 0.1), new THREE.MeshBasicMaterial({color:0x00BFFF})); tearL.position.set(-0.08, 0, 0.2);
    const tearR = new THREE.Mesh(new THREE.CapsuleGeometry(0.02, 0.1), new THREE.MeshBasicMaterial({color:0x00BFFF})); tearR.position.set(0.08, 0, 0.2);
    cHead.add(tearL, tearR);
    const cArmGeo = new THREE.CapsuleGeometry(0.08, 0.4);
    const cArmL = new THREE.Mesh(cArmGeo, mats.child); cArmL.position.set(-0.2, 0.6, 0.1); cArmL.rotation.x = -2.5; cArmL.rotation.z = 0.5; cArmL.name="cArmL";
    const cArmR = new THREE.Mesh(cArmGeo, mats.child); cArmR.position.set(0.2, 0.6, 0.1); cArmR.rotation.x = -2.5; cArmR.rotation.z = -0.5; cArmR.name="cArmR";
    childGrp.add(cBody, cHead, cArmL, cArmR);
    childGrp.traverse(o=>{if(o.isMesh)o.castShadow=true;});
    scene.add(childGrp);

    // PLAYER HANDS
    const playerHands = new THREE.Group();
    const pHandGeo = new THREE.CapsuleGeometry(0.1, 0.5);
    const pHandL = new THREE.Mesh(pHandGeo, mats.skin); pHandL.position.set(-0.3, -0.3, -0.5); pHandL.rotation.x = -Math.PI/2;
    const pHandR = new THREE.Mesh(pHandGeo, mats.skin); pHandR.position.set(0.3, -0.3, -0.5); pHandR.rotation.x = -Math.PI/2;
    playerHands.add(pHandL, pHandR); playerHands.visible=false;

    // --- LOGIC ---
    let state='start', player={x:0,z:10,rot:0}, cooldown=0, menuIndex=0;
    let childMoveTarget = null;
    const keys={};

    window.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key==='Enter')handleEnter();if(state==='menu')handleMenuNav(e.key);});
    window.addEventListener('keyup',e=>keys[e.key]=false);
    document.getElementById('btn-start').onclick=handleEnter;

    function handleEnter(){
        if(state==='start'){document.getElementById('start-screen').classList.add('hidden');state='playing';audio.init();}
        else if(state==='menu'){
            document.getElementById('choice-modal').classList.add('hidden');
            handleAction(document.querySelectorAll('.choice-btn')[menuIndex].dataset.action);
        } else if(state==='resolved') location.reload();
    }
    function handleMenuNav(k){
        if(k==='ArrowRight'){menuIndex=(menuIndex+1)%4;audio.playTone(600);}
        if(k==='ArrowLeft'){menuIndex=(menuIndex+3)%4;audio.playTone(500);}

    }
    function updateMenuUI(){document.querySelectorAll('.choice-btn').forEach((b,i)=>b.classList.toggle('selected',i===menuIndex));}

    function showToast(msg){const t=document.getElementById('toast');t.innerText=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
    function endGame(msg){setTimeout(()=>{document.getElementById('end-desc').innerText=msg;document.getElementById('end-overlay').classList.add('visible');state='resolved';},2000);}

    function handleAction(type){
        __sendDecision(type);
        state = 'animating';
        
        if(type === 'intervene') {
            showToast("התפרצת למעגל!");
            let p=0;
            const int = setInterval(()=>{
                p+=0.02;
                // Move apart to let child out
                adults[0].position.x = THREE.MathUtils.lerp(adults[0].userData.startPos.x, 5.5, p);
                adults[1].position.z = THREE.MathUtils.lerp(adults[1].userData.startPos.z, -5.5, p);
                adults[2].position.x = THREE.MathUtils.lerp(adults[2].userData.startPos.x, -5.5, p);
                adults[3].position.x = THREE.MathUtils.lerp(adults[3].userData.startPos.x, 5.5, p);
                childGrp.position.z += 0.08; 
                if(p>=1) { clearInterval(int); endGame("המעגל פוזר. הילד ברח."); }
            }, 30);

        } else if(type === 'join') {
            showToast("הצטרפת להצבעה...");
            let p=0;
            const int = setInterval(()=>{
                p+=0.01;
                // Move camera closer to center
                const targetX = 0; const targetZ = 2.0; 
                player.x = THREE.MathUtils.lerp(player.x, targetX, 0.05);
                player.z = THREE.MathUtils.lerp(player.z, targetZ, 0.05);
                
                if(p>0.3) playerHands.visible = true; 
                adultGroup.rotation.y += 0.05; 
                camera.rotation.z = Math.sin(p*30)*0.05; 
                if(p>=1) { clearInterval(int); audio.stopChaos(); endGame("הפכת לחלק מהבעיה."); }
            }, 30);

        } else if(type === 'distract') {
            showToast("הם מסתכלים עליך עכשיו!");
            audio.stopChaos(); audio.playTone(200); 
            // Adults turn to face PLAYER coords
            adults.forEach(a => {
                a.lookAt(player.x, 0, player.z); // Dynamic look
                a.getObjectByName("pointingArm").rotation.x = -Math.PI/2 - 0.3; 
            });
            // Child flees away from player
            childGrp.getObjectByName("cArmL").rotation.x = 0;
            childGrp.getObjectByName("cArmR").rotation.x = 0;
            // Vector away from player
            const fleeDir = childGrp.position.clone().sub(new THREE.Vector3(player.x, 0, player.z)).normalize().multiplyScalar(15);
            childMoveTarget = fleeDir;
            setTimeout(()=>endGame("הם צוחקים עליך, אבל הילד ברח."), 2000);

        } else if(type === 'call') {
            showToast("קראת לו...");
            audio.playCalm();
            childGrp.getObjectByName("cArmL").rotation.x = 0;
            childGrp.getObjectByName("cArmR").rotation.x = 0;
            // Child moves TO Player
            childMoveTarget = new THREE.Vector3(player.x, 0, player.z); 
        }
    }

    const clock = new THREE.Clock();
    function update(dt) {
        const dist = Math.hypot(player.x, player.z); 
        if (state === 'playing' || state === 'menu') audio.setIntensity(dist);

        if(state !== 'resolved') {
            adults.forEach((a,i) => { a.position.y = Math.abs(Math.sin(Date.now()*0.01+i))*0.3; });
            childGrp.rotation.z = Math.sin(Date.now()*0.03)*0.05; 
        }

        // Child Logic
        if(childMoveTarget) {
            childGrp.lookAt(childMoveTarget.x, 0, childMoveTarget.z);
            childGrp.translateZ(3 * dt); // Move forward
            
            // Check distance to player for "Call" win
            const dToPlayer = childGrp.position.distanceTo(new THREE.Vector3(player.x, 0, player.z));
            if(dToPlayer < 1.5 && state === 'animating' && !childMoveTarget.equals(new THREE.Vector3(0,0,15))) {
                 endGame("הוא בא אליך בבכי.");
                 childMoveTarget = null;
            }
        }

        if (state === 'playing') {
            // Free Roam Movement
            const speed = 4.0 * dt;
            const rotSpeed = 2.0 * dt;
            
            if (keys.ArrowLeft) player.rot += rotSpeed;
            if (keys.ArrowRight) player.rot -= rotSpeed;
            
            // Calculate direction vectors based on rotation
            const dirX = Math.sin(player.rot);
            const dirZ = Math.cos(player.rot);
            
            if (keys.ArrowUp) {
                player.x -= dirX * speed;
                player.z -= dirZ * speed;
            }
            if (keys.ArrowDown) {
                player.x += dirX * speed;
                player.z += dirZ * speed;
            }

            // Room boundary check (Radius ~8.5)
            const roomRadius = 8.5;
            if (Math.hypot(player.x, player.z) > roomRadius) {
                const angle = Math.atan2(player.x, player.z);
                player.x = Math.sin(angle) * roomRadius;
                player.z = Math.cos(angle) * roomRadius;
            }

            camera.position.y = 1.6 + Math.sin(Date.now()*0.005)*0.04;
            
            // Trigger close to child (dist < 4)
            if(dist < 4.0 && cooldown <= 0) {
                state = 'menu'; menuIndex = 0; updateMenuUI();
                document.getElementById('choice-modal').classList.remove('hidden');
            }
        }
        
        if (cooldown > 0) cooldown -= dt;

        camera.position.x = player.x;
        camera.position.z = player.z;
        camera.rotation.y = player.rot;
    }

    function animate() { requestAnimationFrame(animate); update(Math.min(clock.getDelta(), 0.05)); renderer.render(scene, camera); }
    window.onresize = () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
    animate();
</script>

    class SoundSystem {
        constructor() {
            this.ctx = null; this.masterGain = null;

        }
        init() {
            if (this.ctx) return;
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.masterGain = this.ctx.createGain(); this.masterGain.connect(this.ctx.destination);
            this.setupWarmSound();
            this.setupCleanSound();
        }
        setupWarmSound() { 
            this.leftGain = this.ctx.createGain(); this.leftGain.gain.value = 0;
            this.leftGain.connect(this.masterGain);
            [261.63, 329.63, 392.00].forEach(f => { 
                const o = this.ctx.createOscillator(); o.type = 'triangle'; o.frequency.value = f;
                const g = this.ctx.createGain(); g.gain.value = 0.1;
                o.connect(g); g.connect(this.leftGain); o.start();
            });
        }
        setupCleanSound() { 
            this.rightGain = this.ctx.createGain(); this.rightGain.gain.value = 0;
            this.rightGain.connect(this.masterGain);
            setInterval(()=>{
                if(this.rightGain.gain.value > 0.01) {

        document.getElementById('timer').classList.remove('hidden');

        if(state === 'ended') return;
        const actionId = text === "החדר החמים" ? 'warm_room' : text === "החדר המודרני" ? 'modern_room' : 'time_expired';

        audio.masterGain.gain.setTargetAtTime(0, t, 1);

    function update(dt) {
        if (state === 'playing') {
            timeLeft -= dt;
            const tEl = document.getElementById('timer');
            tEl.innerText = Math.max(0, timeLeft).toFixed(2);
            if (timeLeft <= 5) tEl.classList.add('urgent');
            
            // Check End Condition Logic
            if (timeLeft <= 0) {
                // Check if inside a room zone (even if not at wall)
                if (player.x < -3 && player.z < -14) {
                    endGame("החדר החמים");
                } else if (player.x > 3 && player.z < -14) {
                    endGame("החדר המודרני");
                } else {
                    endGame("הזמן תם");
                }
                return;
            }

            audio.updateMix(player.x, player.z);

            // TANK CONTROLS
            const rotSpeed = 2.0 * dt;
            const moveSpeed = 5.0 * dt;
            
            if(keys.ArrowLeft) player.rot += rotSpeed;
            if(keys.ArrowRight) player.rot -= rotSpeed;
            
            const dirX = Math.sin(player.rot);
            const dirZ = Math.cos(player.rot);
            
            if(keys.ArrowUp) { player.x -= dirX * moveSpeed; player.z -= dirZ * moveSpeed; }
            if(keys.ArrowDown) { player.x += dirX * moveSpeed; player.z += dirZ * moveSpeed; }

            // Boundaries
            if (player.z > -14) { // Hallway
                if(player.x > 2.8) player.x = 2.8; if(player.x < -2.8) player.x = -2.8;
            }
            player.z = Math.min(14, player.z);

            // Trigger Endings (Wall collision)
            if (player.z < -22) {
                if (player.x < 0) endGame("החדר החמים");
                else endGame("החדר המודרני");
            }
        }
        camera.position.x = player.x;
        camera.position.y = 1.7 + Math.sin(Date.now()*0.008)*0.03;
        camera.position.z = player.z;
        camera.rotation.y = player.rot;
    }

    function animate() { requestAnimationFrame(animate); update(Math.min(clock.getDelta(), 0.05)); renderer.render(scene, camera); }
    window.onresize = () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
    animate();
</script>

// --- analytics helpers (decisions + time + value inference) ---
const decisionLog = [];
const sessionStartMs = Date.now();
const boothEnterMs = Object.create(null);
const boothTotalMs = Object.create(null);
const boothVisitCount = Object.create(null);

function _nowISO(){ return new Date().toISOString(); }
function _timeLabel(){
  const ms = Date.now() - sessionStartMs;
  const s = Math.floor(ms/1000);
  const mm = String(Math.floor(s/60)).padStart(2,'0');
  const ss = String(s%60).padStart(2,'0');
  return `${mm}:${ss}`;
}
function _fmtDur(ms){
  const s = Math.max(0, Math.floor(ms/1000));
  const mm = String(Math.floor(s/60)).padStart(2,'0');
  const ss = String(s%60).padStart(2,'0');
  return `${mm}:${ss}`;
}
function _addBoothTime(boothId, endMs){
  const startMs = boothEnterMs[boothId];
  if(typeof startMs !== 'number') return 0;
  const d = Math.max(0, endMs - startMs);
  boothTotalMs[boothId] = (boothTotalMs[boothId] || 0) + d;
  delete boothEnterMs[boothId];
  return d;
}

// Very lightweight value inference from action text (Hebrew + English keywords).
function _inferValues(label){
  // Fallback heuristic when we don't have a booth/action profile.
  const t = (label||"").toLowerCase();
  const hits = [];

  const add=(k)=>{ if(!hits.includes(k)) hits.push(k); };

  // prosocial / care
  if(/help|assist|aid|support|comfort|hug|care|water|feed|save|rescue|דאג|לעזור|תמיכ|ניחומ|להציל|להשקות|להאכיל/.test(t)) add("empathy");
  if(/ask|talk|call|phone|knock|listen|שאל|לדבר|להתקשר|לדפוק|להקשיב/.test(t)) add("communication");

  // ethics / rules
  if(/return|give back|report|police|guard|official|אבטחה|לדווח|להחזיר|משטרה/.test(t)) add("integrity");
  if(/steal|take|keep|hide|שמור|לקחת|להחביא|לגנוב/.test(t)) add("self_interest");

  // risk / boldness
  if(/confront|intervene|approach|enter|go in|להתערב|להיכנס|להתקרב|לעימות/.test(t)) add("courage");
  if(/leave|ignore|walk away|avoid|להתרחק|להתעלם|לעזוב/.test(t)) add("avoidance");

  // curiosity / play
  if(/explore|look|inspect|curious|לבדוק|להסתכל|לחקור/.test(t)) add("curiosity");

  // control / planning
  if(/plan|organize|document|record|write|לארגן|לתעד|לכתוב/.test(t)) add("order");

  return hits;
}

const VALUE_DIMENSIONS = [
  {key:"empathy", label:"אמפתיה ודאגה"},

const ACTION_PROFILES = {

    call:  {tags:["communication","authority","responsibility"], deltas:{communication:+6, authority:+4, responsibility:+4, prudence:+2}},

    join:      {tags:["cooperation","status_ambition"], deltas:{cooperation:+5, status_ambition:+4, integrity:-2}},

  }
};

function _getProfile(boothId, actionId){
  const b = ACTION_PROFILES[String(boothId||"").toLowerCase()];
  if(!b) return null;
  return b[String(actionId||"").toLowerCase()] || null;
}

function scoreDecision(boothId, actionId, label){
  const p = _getProfile(boothId, actionId);
  if(p) return {tags:p.tags.slice(), deltas:Object.assign({}, p.deltas)};
  const tags = _inferValues(label);
  // Convert tags into small deltas (soft scoring)
  const deltas = {};
  const bump=(k,v)=>{ deltas[k]=(deltas[k]||0)+v; };
  for(const tag of tags){
    if(tag==="empathy") bump("empathy", +4);
    if(tag==="communication") bump("communication", +3);
    if(tag==="integrity") bump("integrity", +4);
    if(tag==="courage") bump("courage", +3);
    if(tag==="curiosity") bump("curiosity", +3);
    if(tag==="order") bump("order", +2);
    if(tag==="avoidance") bump("self_care", +2), bump("courage",-2);
    if(tag==="self_interest") bump("integrity",-3), bump("status_ambition", +2);
  }
  return {tags, deltas};
}

function computeValueScores(decisions){
  const scores = {};
  for(const d of VALUE_DIMENSIONS) scores[d.key]=50; // neutral baseline

  for(const r of decisions){
    const deltas = r.deltas || {};
    for(const k of Object.keys(deltas)){
      scores[k] = (scores[k] ?? 50) + deltas[k];
    }
  }
  // clamp
  for(const k of Object.keys(scores)){
    scores[k] = Math.max(0, Math.min(100, Math.round(scores[k])));
  }
  return scores;
}

window.__PG_onBoothEnter = function(boothId){
  boothEnterMs[boothId] = Date.now();
  boothVisitCount[boothId] = (boothVisitCount[boothId] || 0) + 1;
  decisionLog.push({
    tISO: _nowISO(),
    tLabel: _timeLabel(),
    booth: boothId,
    event: 'ENTER',
    actionId: 'ENTER',
    actionLabel: 'נכנס/ה לחדר',
    valueTags: []
  });
};

window.__PG_onBoothExit = function(boothId, reason){

  decisionLog.push({
    tISO: _nowISO(),
    tLabel: _timeLabel(),
    booth: boothId,
    event: 'EXIT',
    actionId: 'EXIT',
    actionLabel: (reason ? `יצא/ה מהחדר (${reason})` : 'יצא/ה מהחדר'),
    valueTags: []
  });
};

// Accepts either: (boothId, actionId, actionLabel) OR a single object payload from postMessage.
window.__PG_logDecision = function(a, b, c, meta){
  // Supports both: __PG_logDecision({boothId, actionId, actionLabel, ...})
  // and: __PG_logDecision(boothId, actionId, actionLabel, meta)
  let payload = null;

  if(a && typeof a === "object"){
    payload = a;
  } else {
    payload = { boothId: a, actionId: b, actionLabel: c };
    if(meta && typeof meta === "object") Object.assign(payload, meta);
  }

  const rawBoothId = (payload.boothId ?? "unknown").toString();
  const boothId = /^\d+$/.test(rawBoothId) ? `booth${rawBoothId}` : rawBoothId;
  const actionId = (payload.actionId ?? payload.action ?? "unknown").toString();
  const actionLabel = (payload.actionLabel ?? payload.label ?? actionId).toString();

  const now = Date.now();
  const sinceStartMs = Math.max(0, now - sessionStartMs);

  // Reaction time since entering booth (if we have it)
  const enterMs = boothEnterMs[boothId];
  const reactionMs = (typeof enterMs === "number") ? Math.max(0, now - enterMs) : null;

  decisionLog.push({
    event: "DECISION",
    ts: now,
    sinceStartMs,
    reactionMs,
    boothId,
    actionId,
    actionLabel,
    tags: [],
    deltas: {},
    meta: payload.meta || null
  });

  if(decisionLog.length > 1000) decisionLog.splice(0, decisionLog.length - 1000);

  if(window.__PG_dashboardOpen){
    try{ renderDashboard(); }catch(e){}
  }
};


function escapeHtml(str){
  return String(str ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}

function renderDashboard(){
  const rowsEl = document.getElementById('dashRows');
  const metaEl = document.getElementById('dashMeta');
  const valueEl = document.getElementById('valuePanel');
  if(!rowsEl || !metaEl || !valueEl) return;

  const factualEvents = decisionLog.filter(Boolean);
  const visited = Object.keys(boothVisitCount).filter(id => boothVisitCount[id] > 0);
  metaEl.innerHTML = `
    <div><b>זמן מאז הכניסה:</b> ${_fmtDur(Date.now() - sessionStartMs)}</div>
    <div><b>אירועים:</b> ${factualEvents.length}</div>
    <div><b>מקומות שנכנסו אליהם:</b> ${visited.length ? visited.join(', ') : '—'}</div>
  `;
  valueEl.innerHTML = `<div class="vText">תצוגת פיתוח בלבד. היומן מציג פעולות שנצפו ואינו מחשב תכונות, ציונים או אבחנות.</div>`;
  rowsEl.innerHTML = factualEvents.length ? factualEvents.slice(-80).reverse().map(event => {
    const booth = event.boothId || event.booth || '—';
    const label = event.actionLabel || event.event || 'אירוע';
    const time = event.tLabel || (typeof event.sinceStartMs === 'number' ? _fmtDur(event.sinceStartMs) : '—');
    return `<tr><td>${escapeHtml(time)}</td><td>${escapeHtml(booth)}</td><td>${escapeHtml(label)}</td></tr>`;
  }).join('') : `<tr><td colspan="3" style="opacity:.7">עדיין לא נרשמו אירועים.</td></tr>`;
  return;

  const decisions = decisionLog.filter(r => r && r.event === "DECISION");
  const totalDecisions = decisions.length;

  // --- basic session metrics ---
  const now = Date.now();
  const elapsedMin = Math.round(((now - sessionStartMs)/60000)*10)/10;

  const boothsVisited = Array.from(new Set(decisions.map(d => d.boothId))).filter(Boolean);
  const perBoothCounts = {};
  for(const d of decisions){
    perBoothCounts[d.boothId] = (perBoothCounts[d.boothId]||0) + 1;
  }

  // --- value scoring ---
  const scores = computeValueScores(decisions);

  // sort values by score
  const sorted = VALUE_DIMENSIONS
    .map(v => ({...v, score: (scores[v.key] ?? 50)}))
    .sort((a,b)=>b.score-a.score);

  const top5 = sorted.slice(0,5);
  const low5 = sorted.slice(-5).reverse();

  // --- decision style signals (lightweight heuristics) ---
  const reaction = decisions.map(d=>d.reactionMs).filter(v=>typeof v==="number");
  const avgReaction = reaction.length ? Math.round(reaction.reduce((a,b)=>a+b,0)/reaction.length) : null;

  const tagCounts = {};
  for(const d of decisions){
    for(const t of (d.tags||[])){
      tagCounts[t]=(tagCounts[t]||0)+1;
    }
  }

  metaEl.innerHTML = `
    <div><b>סה״כ זמן:</b> ${elapsedMin} דק׳</div>
    <div><b>בחירות:</b> ${totalDecisions}</div>
    <div><b>ביתנים שביקרת:</b> ${boothsVisited.length ? boothsVisited.join(", ") : "—"}</div>
    <div><b>זמן תגובה ממוצע:</b> ${avgReaction!=null ? (avgReaction/1000).toFixed(1)+" שנ׳" : "—"}</div>
  `;

  // Values panel
  const row=(v)=>`<div class="vRow"><div class="vLabel">${v.label}</div><div class="vBar"><div class="vFill" style="width:${v.score}%;"></div></div><div class="vScore">${v.score}</div></div>`;
  valueEl.innerHTML = `
    <div class="vSection">
      <div class="vTitle">ערכים דומיננטיים</div>
      ${top5.map(row).join("")}
    </div>
    <div class="vSection">
      <div class="vTitle">ערכים פחות מודגשים</div>
      ${low5.map(row).join("")}
    </div>
    <div class="vSection">
      <div class="vTitle">פירוש קצר (היוריסטי)</div>
      <div class="vText">
        <div>הדשבורד מזהה נטיות דרך <b>בחירות</b>, <b>דפוסי זמן</b> ו<b>אופי פעולה</b>. זה לא אבחון, אלא מראה להתנהגות במשחק.</div>
        <div style="margin-top:6px"><b>תדירות תגיות:</b> ${
          Object.keys(tagCounts).length
            ? Object.entries(tagCounts).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([k,v])=>`${k}: ${v}`).join(" · ")
            : "—"
        }</div>
      </div>
    </div>
  `;

  // Decisions table
  if(!totalDecisions){
    rowsEl.innerHTML = `<tr><td colspan="3" style="opacity:.7">עדיין אין בחירות שנרשמו. טיפ: ודאי שהקליקים על פעולות שולחים DECISION מהביתן.</td></tr>`;
    return;
  }

  const last = decisions.slice(-60).reverse();
  rowsEl.innerHTML = last.map(d => {
    const tsec = Math.round(d.sinceStartMs/1000);
    const tags = (d.tags||[]).slice(0,6).join(", ");
    return `
      <tr><td>${tsec}s</td><td>${d.boothId}</td><td><div style="font-weight:700">${escapeHtml(d.actionLabel || d.actionId)}</div><div style="opacity:.8;font-size:12px">${escapeHtml(tags)}</div></td></tr>
    `;
  }).join("");
}
function openDashboard(){
  window.__PG_dashboardOpen = true;
  renderDashboard();
  const m=document.getElementById('dashModal');
  if(m){ m.classList.add('show'); m.setAttribute('aria-hidden','false'); }

  }
}

// Expose dashboard controls globally and allow booth iframes to open it
window.openDashboard = openDashboard;
window.closeDashboard = closeDashboard;
window.addEventListener('message', (e) => {
  const d = e && e.data;
  if(!d || typeof d !== 'object') return;
  if(state.mode === 'booth' && e.source !== boothIframe.contentWindow) return;

  // Requests from booth iframes
  if(d.type === 'DECISION'){
    const rawBoothId = String(d.boothId || '');
    const boothId = /^\d+$/.test(rawBoothId) ? `booth${rawBoothId}` : rawBoothId;
    const action = String(d.actionId || d.action || '');
    const label  = String(d.actionLabel || d.label || action || '');
    const ts = typeof d.ts === 'number' ? d.ts : Date.now();
    if(boothId){
      __PG_logDecision({ boothId, actionId: action, actionLabel: label, ts });
    }
    return;
  }

  if(d.type === 'REQUEST_CLOSE_BOOTH'){
    const boothId = String(d.boothId || '').replace(/^booth/, '');
    if(boothId) exitBooth(Number(boothId), 'encounter_complete', true);
    return;
  }

  if(d.type === 'REQUEST_ESCAPE_BOOTH'){
    const boothId = String(d.boothId || '').replace(/^booth/, '');
    if(boothId) exitBooth(Number(boothId), 'emergency_exit', false);
    return;
  }

  if(d.type === 'BOOTH_READY'){
    stageHint.style.display = 'block';
    return;
  }

  if(d.type === 'OPEN_DASHBOARD') openDashboard();
  if(d.type === 'CLOSE_DASHBOARD') closeDashboard();
});

    // Shared Three.js objects
    const renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const keys = Object.create(null);
    const clearKeys = () => { for (const key of Object.keys(keys)) keys[key] = false; };
    window.addEventListener('keydown', e => keys[e.key] = true);
    window.addEventListener('keyup', e => keys[e.key] = false);
    window.addEventListener('blur', clearKeys);
    document.addEventListener('visibilitychange', () => { if(document.hidden) clearKeys(); });

    // Booth stage elements
    const boothStage = document.getElementById('booth-stage');
    const boothIframe = document.getElementById('booth-iframe');
    const stageHint = document.getElementById('stage-hint');

    let autoExitTimer = null;

    function instrumentBoothHtml(id, html){
        if(!html) return html;
        const tag = '<!--PG_INSTRUMENTED-->';
        if(html.includes(tag)) return html;

        // Inject a tiny bridge that logs decisions + allows the booth to request closing itself
        const inject = tag + `<script>
(function(){
  const PG_BRIDGE_BOOTH_ID = ${JSON.stringify(String(id))};
  function post(type, payload){
    try{ parent.postMessage(Object.assign({type, boothId: PG_BRIDGE_BOOTH_ID}, payload||{}), '*'); }catch(e){}
  }

  function releaseControls(){
    ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter'].forEach(function(key){
      window.dispatchEvent(new KeyboardEvent('keyup', {key:key, bubbles:true}));
    });
  }
  window.addEventListener('blur', releaseControls);
  document.addEventListener('visibilitychange', function(){ if(document.hidden) releaseControls(); });
  window.addEventListener('keydown', function(event){
    if(event.key !== 'Escape' && event.key !== 'Esc') return;
    event.preventDefault();
    event.stopPropagation();
    releaseControls();
    try{
      if(typeof parent.__PG_escapeBooth === 'function') parent.__PG_escapeBooth(PG_BRIDGE_BOOTH_ID);
      else post('REQUEST_ESCAPE_BOOTH', {});
    }catch(error){ post('REQUEST_ESCAPE_BOOTH', {}); }
  }, true);

  post('BOOTH_READY', {});

  // Auto-exit when an end overlay becomes visible
  const endEl = document.getElementById('end-overlay') || document.querySelector('.end-overlay');
  if(endEl){
    const isVisible = () => {
      const cs = window.getComputedStyle(endEl);
      return cs && cs.display !== 'none' && cs.visibility !== 'hidden' && cs.opacity !== '0';
    };
    const obs = new MutationObserver(function(){
      if(isVisible()){
        setTimeout(()=>post('REQUEST_CLOSE_BOOTH', {}), 600);
      }
    });
    obs.observe(endEl, { attributes:true, attributeFilter:['style','class'] });
    if(isVisible()) setTimeout(()=>post('REQUEST_CLOSE_BOOTH', {}), 600);
  }
})();
<\/script>`;

        return /<\/body\s*>/i.test(html)
          ? html.replace(/<\/body\s*>/i, inject + '</body>')
          : html + inject;
    }

    function getTemplateHtml(id) {
        const t = document.getElementById('tpl-booth' + id);
        const raw = t ? t.innerHTML : '';
        return instrumentBoothHtml(id, raw);
    }

    function enterBooth(id) {
        id = Number(id);
        if(!Number.isInteger(id) || id < 1 || id > 5 || state.mode === 'booth') return;
        let mm = document.getElementById('minimap');
        if (mm) mm.style.display = 'none';

    mm = document.getElementById('minimap'); if (mm) mm.style.display = 'none';
        console.log("Entering Booth", id);

        // close modal
        park.closeModal(false);

        state.mode = 'booth';
        state.activeBoothId = id;
        clearKeys();
        if(window.__PG_onBoothEnter) window.__PG_onBoothEnter(`booth${id}`);
        mm = document.getElementById('minimap');
        if (mm) mm.style.display = 'none';
        boothStage.style.display = 'block';
        boothStage.setAttribute('aria-hidden', 'false');
        stageHint.style.display = 'block';
        if(document.body.classList.contains('force-touch') || matchMedia('(pointer:coarse)').matches){
            document.getElementById('touch-controls').style.display = 'flex';
        }

        // Load booth HTML AS IS into iframe via srcdoc
        boothIframe.srcdoc = getTemplateHtml(id);

        // Auto-exit watcher:
// 1) Preferred: if an element with id="end-overlay" becomes visible (your booths use this)
// Explicit bridge messages are preferred; this poll is a compatibility fallback for end overlays.
if (autoExitTimer) clearInterval(autoExitTimer);
let visibleStreak = 0;

autoExitTimer = setInterval(() => {
    try {
        const doc = boothIframe.contentDocument;
        if (!doc) return;

        // (1) Detect end overlay visibility
        const endOverlay = doc.getElementById('end-overlay');
        let overlayVisible = false;
        if (endOverlay) {
            const cs = getComputedStyle(endOverlay);
            const dispOk = cs.display !== 'none';
            const visOk = cs.visibility !== 'hidden';
            const op = parseFloat(cs.opacity || '1');
            overlayVisible = endOverlay.classList.contains('visible') || (dispOk && visOk && op > 0.25) || (cs.pointerEvents && cs.pointerEvents !== 'none');
        }

        if (overlayVisible) visibleStreak++;
        else visibleStreak = 0;

        // ~1.0–1.5s stable => exit
        if (visibleStreak >= 2) {
            exitBooth(id, 'auto_end_screen');
        }
    } catch(e) {}
}, 500);
    }

    function exitBooth(id, reason, completed = true) {
        id = Number(id || state.activeBoothId);
        if(state.mode !== 'booth' || !Number.isInteger(id) || id !== Number(state.activeBoothId)) return;
        // mark completed
        if(completed){
            state.completed.add(id);
            saveCompleted(state.completed);
        }

        // close iframe stage
        if (autoExitTimer) { clearInterval(autoExitTimer); autoExitTimer = null; }
        boothIframe.srcdoc = "<!doctype html><html><body style='margin:0;background:#000;'></body></html>";
        boothStage.style.display = 'none';
        boothStage.setAttribute('aria-hidden', 'true');
        stageHint.style.display = 'none';
        if(!document.body.classList.contains('force-touch') && !matchMedia('(pointer:coarse)').matches){
            document.getElementById('touch-controls').style.display = '';
        }

        // refresh checkmarks
        park.rebuildBooths();

        // push player back slightly to avoid instant re-open
        state.lastExitBoothId = id;
        state.exitCooldownUntil = performance.now() + 1600;

        state.player.z -= Math.cos(state.player.rot) * 8;
        state.player.x -= Math.sin(state.player.rot) * 8;
        state.player.x = THREE.MathUtils.clamp(state.player.x, -58, 58);
        state.player.z = THREE.MathUtils.clamp(state.player.z, -58, 58);
        if(window.__PG_onBoothExit) window.__PG_onBoothExit(`booth${id}`, reason || 'exit');
        state.activeBoothId = null;
        clearKeys();
        state.mode = 'park';
        const mm = document.getElementById('minimap');
        if(mm) mm.style.display = 'block';
    }
    window.__PG_escapeBooth = id => exitBooth(Number(String(id).replace(/^booth/, '')), 'emergency_exit', false);

    // Emergency exit (keyboard only)
    window.addEventListener('keydown', (e) => {
        if (state.mode === 'booth' && e.key === 'Escape') {
            e.preventDefault();
            exitBooth(state.activeBoothId, 'emergency_exit', false);
        }
    });

    // --- PARK LOGIC ---
    class Park {
        init() {
            this.scene = new THREE.Scene(); this.scene.background = new THREE.Color(0x87CEEB);
            this.scene.fog = new THREE.Fog(0x87CEEB, 10, 80);
            this.camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 200);

            // Ground & Path
            const grass = new THREE.Mesh(new THREE.PlaneGeometry(200,200), new THREE.MeshStandardMaterial({color:0x55aa55}));
            grass.rotation.x=-Math.PI/2; this.scene.add(grass);

            const paths = new THREE.Group();
            const matPath = new THREE.MeshStandardMaterial({color:0xe0d6aa});
            const p1 = new THREE.Mesh(new THREE.BoxGeometry(6, 0.1, 60), matPath); p1.position.y=0.05;
            const p2 = new THREE.Mesh(new THREE.BoxGeometry(40, 0.1, 4), matPath); p2.position.set(0,0.05,-5);
            const p3 = new THREE.Mesh(new THREE.BoxGeometry(40, 0.1, 4), matPath); p3.position.set(0,0.05,-25);
            // Side paths
            const p4 = new THREE.Mesh(new THREE.BoxGeometry(4, 0.1, 10), matPath); p4.position.set(-18, 0.05, -5); p4.rotation.y = Math.PI/2;
            const p5 = new THREE.Mesh(new THREE.BoxGeometry(4, 0.1, 10), matPath); p5.position.set(18, 0.05, -5); p5.rotation.y = Math.PI/2;

            paths.add(p1,p2,p3,p4,p5); this.scene.add(paths);

            // Booths
            this.booths = [
                {id:1, x:0, z:20, col:0xDDDDDD}, {id:2, x:-18, z:-5, col:0x4169E1},
                {id:3, x:18, z:-5, col:0xFFDAB9}, {id:4, x:-18, z:-25, col:0x9370DB},
                {id:5, x:18, z:-25, col:0x333333}
            ];

            // Trees
            for(let i=0; i<40; i++) {
                const t = new THREE.Group();
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.8,2), new THREE.MeshStandardMaterial({color:0x8B4513}));
                trunk.position.y=1;
                const leaves = new THREE.Mesh(new THREE.ConeGeometry(2.5,6,8), new THREE.MeshStandardMaterial({color:0x228B22}));
                leaves.position.y=4;
                t.add(trunk, leaves);
                let tx=(Math.random()-0.5)*90, tz=(Math.random()-0.5)*90;
                if(Math.abs(tx)<10 && Math.abs(tz)<30) tx+=15;
                t.position.set(tx,0,tz); this.scene.add(t);
            }

            const sun = new THREE.DirectionalLight(0xffffff, 1); sun.position.set(50,100,50); this.scene.add(sun);
            this.scene.add(new THREE.AmbientLight(0xffffff, 0.5));

            // Minimap (park only)
            this.mm = document.getElementById("minimap");
            this.mmCtx = this.mm.getContext("2d");
            this.mmVisible = true;

            // Minimap (park only)
            this.mm = document.getElementById('minimap');
            this.mmCtx = this.mm.getContext('2d');
            this.mm.style.display = 'block';

            this.modalOpen = false;
            this.modalSel = true; // Yes
            this.boothMeshes = [];
            this.rebuildBooths();
        }

        rebuildBooths() {
            for (const m of this.boothMeshes) this.scene.remove(m);
            this.boothMeshes = [];

            this.booths.forEach(b => {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(5,5,5), new THREE.MeshStandardMaterial({color:b.col}));
                mesh.position.set(b.x, 2.5, b.z);

                const door = new THREE.Mesh(new THREE.BoxGeometry(2.5, 3.5, 0.2), new THREE.MeshStandardMaterial({color: 0x222}));
                door.position.set(0, -0.75, 2.6);
                mesh.add(door);

                const num = new THREE.Mesh(new THREE.SphereGeometry(0.8), new THREE.MeshBasicMaterial({color: 0xFFFFFF}));
                num.position.set(0, 3.5, 0);
                mesh.add(num);

                if(state.completed.has(b.id)) {
                    const check = new THREE.Group();
                    const a = new THREE.Mesh(new THREE.BoxGeometry(0.5,2.0,0.2), new THREE.MeshBasicMaterial({color:0x00FF00}));
                    const b2 = new THREE.Mesh(new THREE.BoxGeometry(0.5,3.0,0.2), new THREE.MeshBasicMaterial({color:0x00FF00}));
                    a.position.set(-0.6, 5.0, 0); a.rotation.z = -0.75;
                    b2.position.set(0.4, 5.2, 0); b2.rotation.z = 0.75;
                    check.add(a,b2);
                    mesh.add(check);
                }

                this.scene.add(mesh);
                this.boothMeshes.push(mesh);
            });
        }

        update(dt) {
            if (state.mode === 'booth') return;
            if(this.modalOpen) {
                renderer.render(this.scene, this.camera);

            this.drawMiniMap();
            
                return;
            }

            const rotSpeed = 2.0 * dt;
            const moveSpeed = 8.0 * dt;

            if(keys.ArrowLeft) state.player.rot += rotSpeed;
            if(keys.ArrowRight) state.player.rot -= rotSpeed;

            const dx = Math.sin(state.player.rot);
            const dz = Math.cos(state.player.rot);

            const direction = (keys.ArrowUp ? 1 : 0) - (keys.ArrowDown ? 1 : 0);
            if(direction){
                const targetX = state.player.x + dx * moveSpeed * direction;
                const targetZ = state.player.z + dz * moveSpeed * direction;
                this.movePlayerSafely(targetX, targetZ);
            }

            this.camera.position.x = state.player.x - dx * 8;
            this.camera.position.z = state.player.z - dz * 8;
            this.camera.position.y = 5;
            this.camera.lookAt(state.player.x, 2, state.player.z);

            for (const b of this.booths) {
                const dist = Math.hypot(state.player.x - b.x, state.player.z - b.z);
                if(dist < 7) {
                    const now = performance.now();
                    if (!(state.lastExitBoothId === b.id && now < state.exitCooldownUntil)) {
                        this.openModal(b.id);
                        break;
                    }
                }
            }

            renderer.render(this.scene, this.camera);

            this.drawMiniMap();
            
        }

        isBlocked(x, z) {
            if(!Number.isFinite(x) || !Number.isFinite(z) || Math.abs(x) > 58 || Math.abs(z) > 58) return true;
            return this.booths.some(booth => Math.hypot(x - booth.x, z - booth.z) < 3.7);
        }

        movePlayerSafely(targetX, targetZ) {
            const oldX = state.player.x;
            const oldZ = state.player.z;
            if(!this.isBlocked(targetX, oldZ)) state.player.x = targetX;
            if(!this.isBlocked(state.player.x, targetZ)) state.player.z = targetZ;
            if(this.isBlocked(state.player.x, state.player.z)) {
                state.player.x = oldX;
                state.player.z = oldZ;
            }
        }

        drawMiniMap() {
            const c = this.mm;
            const ctx = this.mmCtx;
            if (!c || !ctx) return;
            const w = c.width, h = c.height;
            ctx.clearRect(0,0,w,h);

            // Park bounds (match ground size roughly)
            const worldMin = -60, worldMax = 60;
            const toX = (x) => (x - worldMin) / (worldMax - worldMin) * w;
            const toY = (z) => (z - worldMin) / (worldMax - worldMin) * h;

            // Background
            ctx.fillStyle = 'rgba(0,0,0,0.35)';
            ctx.fillRect(0,0,w,h);
            ctx.strokeStyle = 'rgba(255,255,255,0.6)';
            ctx.lineWidth = 2;
            ctx.strokeRect(2,2,w-4,h-4);

            // Booth markers
            for (const b of this.booths) {
                const bx = toX(b.x);
                const by = toY(b.z);
                ctx.beginPath();
                ctx.arc(bx, by, 4, 0, Math.PI*2);
                ctx.fillStyle = state.completed.has(b.id) ? '#2ee06b' : '#f2c94c';
                ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                ctx.stroke();
            }

            // Player arrow
            const px = toX(state.player.x);
            const py = toY(state.player.z);
            const a = -state.player.rot; // canvas Y goes down
            const r = 8;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.moveTo(px + Math.sin(a)*r, py - Math.cos(a)*r);
            ctx.lineTo(px + Math.sin(a+2.5)*r*0.8, py - Math.cos(a+2.5)*r*0.8);
            ctx.lineTo(px + Math.sin(a-2.5)*r*0.8, py - Math.cos(a-2.5)*r*0.8);
            ctx.closePath();
            ctx.fill();
        }

        openModal(id) {
            if(this.modalOpen || state.mode !== 'park') return;
            this.modalOpen = true;
            state.mode = 'modal';
            state.activeBoothId = id;
            document.getElementById('modal-title').innerText = "ביתן " + id;
            document.getElementById('interact-modal').style.display = 'flex';
            this.modalSel = true;
            this.updateModalUI();
        }

        closeModal(cancelled = true) {
            this.modalOpen = false;
            state.mode = 'park';
            document.getElementById('interact-modal').style.display = 'none';
            if(cancelled && state.activeBoothId){
                state.lastExitBoothId = state.activeBoothId;
                state.exitCooldownUntil = performance.now() + 1000;
                state.player.z -= Math.cos(state.player.rot) * 2;
                state.player.x -= Math.sin(state.player.rot) * 2;
                state.activeBoothId = null;
            }
        }

        handleInput(key) {
            if(this.modalOpen) {
                if(key === 'ArrowRight' || key === 'ArrowLeft' || key === 'ArrowUp' || key === 'ArrowDown') {
                    this.modalSel = !this.modalSel;
                    this.updateModalUI();
                }
                if(key === 'Enter') {
                    if(this.modalSel) enterBooth(state.activeBoothId);
                    else this.closeModal();
                }
            }
        }

        updateModalUI() {
            const y = document.getElementById('btn-enter');
            const n = document.getElementById('btn-cancel');
            if(this.modalSel) { y.classList.add('selected'); n.classList.remove('selected'); }
            else { y.classList.remove('selected'); n.classList.add('selected'); }
        }
    }

    const park = new Park();
    park.init();

    document.getElementById('btn-enter').onclick = () => enterBooth(state.activeBoothId);
    document.getElementById('btn-cancel').onclick = () => park.closeModal();

    document.querySelectorAll('[data-qa-booth]').forEach(button => {
        button.addEventListener('click', () => {
            if(state.mode === 'booth') exitBooth(state.activeBoothId, 'qa_switch', false);
            enterBooth(Number(button.dataset.qaBooth));
        });
    });
    document.getElementById('qa-exit').addEventListener('click', () => exitBooth(state.activeBoothId, 'qa_exit', false));

    function dispatchControl(key, pressed) {
        if(state.mode === 'booth') {
            const target = boothIframe.contentWindow;
            if(target) target.dispatchEvent(new KeyboardEvent(pressed ? 'keydown' : 'keyup', {key, bubbles:true}));
            return;
        }
        if(state.mode === 'modal' && pressed) {
            park.handleInput(key);
            return;
        }
        keys[key] = pressed;
    }

    document.querySelectorAll('#touch-controls [data-control]').forEach(button => {
        const key = button.dataset.control;
        let pressedAt = 0;
        let releaseTimer = null;
        const release = event => {
            event.preventDefault();
            const finishRelease = () => {
                button.classList.remove('is-held');
                dispatchControl(key, false);
                releaseTimer = null;
            };
            clearTimeout(releaseTimer);
            releaseTimer = setTimeout(finishRelease, Math.max(0, 120 - (performance.now() - pressedAt)));
        };
        button.addEventListener('pointerdown', event => {
            event.preventDefault();
            clearTimeout(releaseTimer);
            pressedAt = performance.now();
            button.setPointerCapture?.(event.pointerId);
            button.classList.add('is-held');
            dispatchControl(key, true);
        });
        button.addEventListener('pointerup', release);
        button.addEventListener('pointercancel', release);
        button.addEventListener('lostpointercapture', release);
    });

    window.addEventListener('keydown', (e) => {
        if (park.modalOpen) {
            // keep it keyboard-only and avoid page scrolling
            if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter'].includes(e.key)) e.preventDefault();
            park.handleInput(e.key);
        }
    }, { passive: false });

    const clock = new THREE.Clock();
    function animate() {
        requestAnimationFrame(animate);
        const dt = Math.min(clock.getDelta(), 0.05);
        park.update(dt);
    }
    animate();
</script>
