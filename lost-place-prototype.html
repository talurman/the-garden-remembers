<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>The Garden Remembers — Lost Place</title>
  <style>
    :root{color-scheme:light;--ink:#263d46;--paper:#fffaf0;--sage:#9fb7a2;--coral:#ef927c;--turquoise:#47b8b0}
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#edf2e8;font-family:Inter,Avenir,system-ui,sans-serif;color:var(--ink)}
    canvas{display:block;width:100%;height:100%;touch-action:none}
    #intro,#reflection{position:fixed;inset:0;z-index:20;display:grid;place-items:center;padding:28px;pointer-events:none;background:linear-gradient(180deg,rgba(255,252,240,.9),rgba(232,242,232,.68));transition:opacity 1.2s ease}
    #intro.hidden,#reflection.hidden{opacity:0;visibility:hidden}
    .paper{max-width:560px;padding:42px 48px;text-align:center;background:rgba(255,250,240,.82);border:1px solid rgba(38,61,70,.14);box-shadow:0 24px 80px rgba(48,74,68,.12);backdrop-filter:blur(14px)}
    h1{font-family:Georgia,serif;font-weight:400;font-size:clamp(32px,6vw,58px);letter-spacing:.02em;margin:0 0 18px}
    p{font-size:clamp(15px,2vw,19px);line-height:1.75;margin:8px 0}
    .whisper{opacity:.68;font-size:14px;letter-spacing:.05em}
    #hint{position:fixed;z-index:12;right:50%;bottom:34px;transform:translateX(50%);padding:10px 16px;border-radius:999px;background:rgba(255,250,240,.72);border:1px solid rgba(38,61,70,.12);box-shadow:0 8px 26px rgba(38,61,70,.12);font-size:14px;opacity:0;transition:opacity .45s ease;pointer-events:none;white-space:nowrap}
    #hint.visible{opacity:1}
    #reticle{position:fixed;z-index:10;left:50%;top:50%;width:7px;height:7px;border:1px solid rgba(38,61,70,.5);border-radius:50%;transform:translate(-50%,-50%);pointer-events:none}
    #touch{position:fixed;z-index:15;inset:auto 0 max(18px,env(safe-area-inset-bottom)) 0;display:none;justify-content:space-between;align-items:flex-end;padding:0 18px;direction:ltr;pointer-events:none}
    .pad{display:grid;grid-template-columns:repeat(3,54px);grid-template-rows:repeat(2,54px);gap:7px;pointer-events:auto}
    #touch button{border:1px solid rgba(255,255,255,.75);background:rgba(38,61,70,.36);color:white;border-radius:50%;font-size:22px;touch-action:none;backdrop-filter:blur(8px)}
    .pad [data-key="ArrowUp"]{grid-column:2}.pad [data-key="ArrowLeft"]{grid-row:2;grid-column:1}.pad [data-key="ArrowDown"]{grid-row:2;grid-column:2}.pad [data-key="ArrowRight"]{grid-row:2;grid-column:3}
    #act{width:72px;height:72px;font-size:13px!important;font-weight:700;pointer-events:auto}
    #debug{display:none;position:fixed;z-index:30;left:12px;top:12px;direction:ltr;gap:6px}
    #debug button{border:1px solid rgba(38,61,70,.24);background:rgba(255,250,240,.85);color:var(--ink);padding:8px 10px;border-radius:8px}
    #debug-state{padding:7px 9px;border-radius:8px;background:rgba(255,250,240,.82);font:12px/1.3 ui-monospace,monospace;color:var(--ink)}
    @media(pointer:coarse){#touch{display:flex}#reticle{display:none}}
    @media(prefers-reduced-motion:reduce){#intro,#reflection,#hint{transition:none}}
  </style>
  <script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}</script>
</head>
<body>
  <div id="intro">
    <div class="paper">
      <h1>המקום האבוד</h1>
      <p>הגן אינו מבקש ממך דבר.</p>
      <p class="whisper">חצים או WASD לתנועה · גרירה להביט · E או ENTER למגע</p>
    </div>
  </div>
  <div id="reflection" class="hidden"><div class="paper"><h1>הגן זכר</h1><div id="reflection-copy"></div><p class="whisper">ESC כדי להמשיך לשוטט</p></div></div>
  <div id="hint"></div><div id="reticle" aria-hidden="true"></div>
  <div id="touch" aria-label="בקרי תנועה">
    <div class="pad">
      <button data-key="ArrowUp" aria-label="קדימה">↑</button><button data-key="ArrowLeft" aria-label="שמאלה">←</button>
      <button data-key="ArrowDown" aria-label="אחורה">↓</button><button data-key="ArrowRight" aria-label="ימינה">→</button>
    </div>
    <button id="act" aria-label="מגע">מגע</button>
  </div>
  <div id="debug"><button id="reset">Reset</button><button id="facts">Facts</button><output id="debug-state"></output></div>
  <script type="module">
    import * as THREE from 'three';
    import {ObservationLog,MemoryState,MemoryDirector,ReflectionComposer} from './src/memory/index.mjs';

    const reducedMotion=matchMedia('(prefers-reduced-motion:reduce)').matches;
    const intro=document.getElementById('intro'),hint=document.getElementById('hint'),reflection=document.getElementById('reflection'),reflectionCopy=document.getElementById('reflection-copy');
    if(new URLSearchParams(location.search).get('debug')==='1') document.getElementById('debug').style.display='flex';
    setTimeout(()=>intro.classList.add('hidden'),2400);

    const renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setPixelRatio(Math.min(devicePixelRatio,1.8)); renderer.setSize(innerWidth,innerHeight);
    renderer.outputColorSpace=THREE.SRGBColorSpace; renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.05;
    document.body.prepend(renderer.domElement);
    const scene=new THREE.Scene(); scene.background=new THREE.Color(0xedf2e8); scene.fog=new THREE.FogExp2(0xdde9df,.018);
    const camera=new THREE.PerspectiveCamera(54,innerWidth/innerHeight,.1,120); camera.rotation.order='YXZ';
    const player={x:0,z:15,yaw:0,pitch:0}; camera.position.set(player.x,1.65,player.z);

    scene.add(new THREE.HemisphereLight(0xfff9e9,0x78968b,2.2));
    const sun=new THREE.DirectionalLight(0xfff2d7,2.4); sun.position.set(-8,16,10); scene.add(sun);
    const ground=new THREE.Mesh(new THREE.PlaneGeometry(80,80),new THREE.MeshStandardMaterial({color:0xb9cbb3,roughness:1})); ground.rotation.x=-Math.PI/2; scene.add(ground);

    const stoneMat=new THREE.MeshStandardMaterial({color:0xe7e1d1,roughness:.96});
    for(let i=0;i<18;i++){
      const stone=new THREE.Mesh(new THREE.CylinderGeometry(1.05+Math.sin(i)*.12,1.12,.16,20),stoneMat.clone());
      stone.scale.z=.72; stone.position.set(Math.sin(i*.72)*1.25,.08,13-i*2.25); stone.rotation.y=Math.sin(i)*.28; scene.add(stone);
    }
    const waterMat=new THREE.MeshPhysicalMaterial({color:0x6bbab7,transparent:true,opacity:.45,roughness:.12,transmission:.22});
    for(const x of [-5.5,5.5]){const water=new THREE.Mesh(new THREE.PlaneGeometry(5.2,62),waterMat.clone());water.rotation.x=-Math.PI/2;water.position.set(x,.025,-7);scene.add(water)}

    function tree(x,z,s=1){const g=new THREE.Group();const trunk=new THREE.Mesh(new THREE.CylinderGeometry(.22,.38,3.2,10),new THREE.MeshStandardMaterial({color:0x806652,roughness:1}));trunk.position.y=1.6;const crown=new THREE.Mesh(new THREE.SphereGeometry(1.8,18,12),new THREE.MeshStandardMaterial({color:0x7ea087,roughness:1}));crown.scale.set(1,1.3,.82);crown.position.y=4;g.add(trunk,crown);g.position.set(x,0,z);g.scale.setScalar(s);scene.add(g)}
    [[-8,11,1.1],[8,8,.9],[-9,-1,.8],[9,-8,1.2],[-8,-17,1],[8,-22,.85]].forEach(v=>tree(...v));

    const object=new THREE.Group();
    const walletMat=new THREE.MeshStandardMaterial({color:0xc86e58,roughness:.9});
    const wallet=new THREE.Mesh(new THREE.BoxGeometry(.72,.14,.48),walletMat);wallet.rotation.y=.22;object.add(wallet);object.position.set(.6,.18,1.2);scene.add(object);
    const originalObjectPosition=object.position.clone();
    let objectState='ground';

    const visitor=new THREE.Group();
    const cloth=new THREE.MeshStandardMaterial({color:0x536f7a,roughness:1});
    const body=new THREE.Mesh(new THREE.CapsuleGeometry(.34,1.05,8,16),cloth);body.position.y=1.05;
    const head=new THREE.Mesh(new THREE.SphereGeometry(.27,18,12),new THREE.MeshStandardMaterial({color:0xd7aa89,roughness:1}));head.position.y=1.93;
    visitor.add(body,head);visitor.position.set(3.5,0,-4.2);scene.add(visitor);

    const blooms=[];
    for(let i=0;i<10;i++){const bloom=new THREE.Mesh(new THREE.SphereGeometry(.12,10,8),new THREE.MeshStandardMaterial({color:i%2?0xef927c:0x47b8b0,roughness:1}));const a=i/10*Math.PI*2;bloom.position.set(originalObjectPosition.x+Math.cos(a)*1.5,.12,originalObjectPosition.z+Math.sin(a)*1.1);bloom.scale.setScalar(.01);scene.add(bloom);blooms.push(bloom)}

    const gate=new THREE.Group();
    const gateMat=new THREE.MeshStandardMaterial({color:0xeee5d4,roughness:.92});
    const ring=new THREE.Mesh(new THREE.TorusGeometry(3.15,.32,16,64),gateMat);ring.position.y=3.25;
    const p1=new THREE.Mesh(new THREE.BoxGeometry(.65,3.3,.7),gateMat),p2=p1.clone();p1.position.set(-3.15,1.65,0);p2.position.set(3.15,1.65,0);gate.add(ring,p1,p2);gate.position.z=-27;scene.add(gate);
    const paperMat=new THREE.MeshStandardMaterial({color:0xf6d5b5,transparent:true,opacity:.38,side:THREE.DoubleSide,roughness:1});
    const paper=new THREE.Mesh(new THREE.PlaneGeometry(5.7,5.8),paperMat);paper.position.set(0,3,-27.1);scene.add(paper);

    const observationLog=new ObservationLog(); const memoryState=new MemoryState(observationLog); const memoryDirector=new MemoryDirector({observationLog,memoryState,delays:{delayed:2600}}); const composer=new ReflectionComposer();
    const responseMeshes=[],keys=Object.create(null),keyImpulse=Object.create(null); let enteredLost=false,leftLost=false,returnObserved=false,approachArmed=true,retreatArmed=false,stillStart=performance.now(),stillRecorded=false,lastStep=new THREE.Vector2(player.x,player.z),stepCount=0,reflectionShown=false;
    function observe(input){const event=observationLog.append(input);memoryDirector.observe(event);return event}
    function pigment(x,z,color=0x47b8b0,scale=1){const mat=new THREE.MeshBasicMaterial({color,transparent:true,opacity:.24,depthWrite:false});const mesh=new THREE.Mesh(new THREE.CircleGeometry(.28*scale,24),mat);mesh.rotation.x=-Math.PI/2;mesh.position.set(x,.035,z);scene.add(mesh);responseMeshes.push({mesh,born:performance.now(),target:1.8*scale});}
    function applyResponse(response){
      if(response.kind==='pigment_echo') pigment(player.x,player.z,0x47b8b0,1.8);
      if(response.kind==='planting_echo'){blooms.forEach((b,i)=>{b.userData.delay=i*70});paper.material.color.set(objectState==='ground'?0x82c8c0:objectState==='returned'?0xf1a083:0x9b8db7);paper.material.opacity=.58}
      if(response.kind==='return_recognition'){blooms.forEach((b,i)=>{b.userData.delay=i*45});visitor.rotation.y=Math.atan2(player.x-visitor.position.x,player.z-visitor.position.z)}
    }

    function interact(){
      if(!reflection.classList.contains('hidden')){reflection.classList.add('hidden');reflectionShown=false;return}
      const dObject=Math.hypot(player.x-object.position.x,player.z-object.position.z);
      if(objectState==='ground'&&dObject<1.8){objectState='carried';observe({type:'object.picked_up',locationId:'lost-place',subjectId:'lost-object',position:{x:player.x,z:player.z}});pigment(object.position.x,object.position.z,0xef927c,1.5);return}
      if(objectState==='carried'){
        const forward=new THREE.Vector3(-Math.sin(player.yaw),0,-Math.cos(player.yaw));object.position.set(player.x+forward.x*1.15,.18,player.z+forward.z*1.15);objectState=Math.hypot(object.position.x-visitor.position.x,object.position.z-visitor.position.z)<2.2?'returned':'placed';
        observe({type:'object.placed',locationId:'lost-place',subjectId:'lost-object',position:{x:object.position.x,z:object.position.z},metadata:{nearVisitor:objectState==='returned'}});pigment(object.position.x,object.position.z,objectState==='returned'?0xef927c:0x8b80b4,1.7);if(objectState==='returned')visitor.rotation.y=Math.PI;return
      }
    }

    addEventListener('keydown',e=>{const key=e.key.toLowerCase();keys[key]=true;if(['arrowup','arrowdown','arrowleft','arrowright','w','a','s','d'].includes(key))keyImpulse[key]=Math.min(.8,(keyImpulse[key]||0)+.1);if(e.key==='Enter'||key==='e')interact();if(e.key==='Escape'&&!reflection.classList.contains('hidden')){reflection.classList.add('hidden');reflectionShown=false}});
    addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);addEventListener('blur',()=>Object.keys(keys).forEach(k=>keys[k]=false));
    let dragging=false,lastPointer=null;renderer.domElement.addEventListener('pointerdown',e=>{dragging=true;lastPointer={x:e.clientX,y:e.clientY};renderer.domElement.setPointerCapture(e.pointerId)});renderer.domElement.addEventListener('pointermove',e=>{if(!dragging||!lastPointer)return;player.yaw-=(e.clientX-lastPointer.x)*.0032;player.pitch=THREE.MathUtils.clamp(player.pitch-(e.clientY-lastPointer.y)*.0024,-.5,.42);lastPointer={x:e.clientX,y:e.clientY}});renderer.domElement.addEventListener('pointerup',()=>dragging=false);
    document.querySelectorAll('[data-key]').forEach(button=>{const key=button.dataset.key.toLowerCase();button.addEventListener('pointerdown',e=>{e.preventDefault();keys[key]=true;button.setPointerCapture(e.pointerId)});for(const name of ['pointerup','pointercancel','lostpointercapture'])button.addEventListener(name,()=>keys[key]=false)});document.getElementById('act').addEventListener('click',interact);

    function update(dt,now){
      const active=key=>keys[key]||(keyImpulse[key]||0)>0;const forward=(active('arrowup')||active('w')?1:0)-(active('arrowdown')||active('s')?1:0),side=(active('arrowright')||active('d')?1:0)-(active('arrowleft')||active('a')?1:0);const speed=4.4;for(const key of Object.keys(keyImpulse))keyImpulse[key]=Math.max(0,keyImpulse[key]-dt);
      const dx=(-Math.sin(player.yaw)*forward+Math.cos(player.yaw)*side)*speed*dt,dz=(-Math.cos(player.yaw)*forward-Math.sin(player.yaw)*side)*speed*dt;
      player.x=THREE.MathUtils.clamp(player.x+dx,-12,12);player.z=THREE.MathUtils.clamp(player.z+dz,-32,20);camera.position.set(player.x,1.65,player.z);camera.rotation.set(player.pitch,player.yaw,0);
      if(objectState==='carried'){const f=new THREE.Vector3(-Math.sin(player.yaw),0,-Math.cos(player.yaw));object.position.set(player.x+f.x*.72,1.15,player.z+f.z*.72);object.rotation.y=player.yaw+.35}
      const moved=Math.hypot(dx,dz);if(moved>.002){stillStart=now;stillRecorded=false;const stepDistance=lastStep.distanceTo(new THREE.Vector2(player.x,player.z));if(stepDistance>.7){lastStep.set(player.x,player.z);stepCount++;pigment(player.x,player.z,stepCount%3===0?0xef927c:0x47b8b0,.8);if(stepCount%4===0)observe({type:'environment.contact',locationId:'garden-path',subjectId:'stone',position:{x:player.x,z:player.z},metadata:{surface:'limestone'}})}}else if(!stillRecorded&&now-stillStart>3200&&enteredLost){stillRecorded=true;observe({type:'movement.still',locationId:'lost-place',position:{x:player.x,z:player.z},durationMs:Math.round(now-stillStart)})}
      const inLost=player.z<8&&player.z>-8;if(inLost&&!enteredLost){enteredLost=true;observe({type:'location.entered',locationId:'lost-place',position:{x:player.x,z:player.z}})}if(enteredLost&&!leftLost&&player.z<-8){leftLost=true;observe({type:'location.exited',locationId:'lost-place',position:{x:player.x,z:player.z},metadata:{objectState}})}if(leftLost&&inLost&&!returnObserved){returnObserved=true;observe({type:'location.entered',locationId:'lost-place',position:{x:player.x,z:player.z},metadata:{return:true}})}
      const dObject=Math.hypot(player.x-object.position.x,player.z-object.position.z);if(objectState==='ground'&&dObject<4&&approachArmed){approachArmed=false;retreatArmed=true;observe({type:'movement.approached',locationId:'lost-place',subjectId:'lost-object',position:{x:player.x,z:player.z}})}if(objectState==='ground'&&dObject>5&&retreatArmed){retreatArmed=false;approachArmed=true;observe({type:'movement.retreated',locationId:'lost-place',subjectId:'lost-object',position:{x:player.x,z:player.z}})}
      const responses=memoryDirector.tick(Date.now());responses.forEach(applyResponse);for(const item of responseMeshes){const age=(now-item.born)/1000;item.mesh.scale.setScalar(THREE.MathUtils.lerp(item.mesh.scale.x,item.target,Math.min(1,dt*2)));item.mesh.material.opacity=Math.max(.08,.26-age*.015)}for(const bloom of blooms){if(bloom.userData.delay!=null){bloom.userData.delay-=dt*1000;if(bloom.userData.delay<=0)bloom.scale.lerp(new THREE.Vector3(1,1,1),dt*2.4)}}
      const canTouch=dObject<1.8||objectState==='carried';hint.textContent=objectState==='carried'?'E / ENTER — להניח':dObject<1.8?'E / ENTER — לגעת':'';hint.classList.toggle('visible',canTouch);
      if(player.z<-24&&!reflectionShown){reflectionShown=true;showReflection()}
      if(document.getElementById('debug').style.display==='flex')document.getElementById('debug-state').textContent=`x ${player.x.toFixed(1)} · z ${player.z.toFixed(1)} · ${objectState} · ${observationLog.all().length} facts · ${memoryState.visibleChanges().length} memories`;
      renderer.render(scene,camera);
    }
    function showReflection(){
      if(objectState==='untouched'&&enteredLost)objectState='untouched';
      const facts=[];if(objectState==='returned')facts.push('הרמת את החפץ והנחת אותו ליד מי שחיפש שם.');else if(objectState==='carried')facts.push('נשאת את החפץ מעבר למקום שבו מצאת אותו.');else if(objectState==='placed')facts.push('הרמת את החפץ והנחת אותו במקום אחר.');else facts.push('חלפת ליד החפץ מבלי להזיז אותו.');
      for(const line of composer.compose(observationLog,{maxLines:2}))facts.push(line.text);reflectionCopy.innerHTML=facts.map(f=>`<p>${f}</p>`).join('');reflection.classList.remove('hidden');
    }
    document.getElementById('reset').onclick=()=>location.reload();document.getElementById('facts').onclick=()=>console.table(observationLog.all().map(e=>({id:e.id,type:e.type,place:e.locationId,subject:e.subjectId})));
    const clock=new THREE.Clock();function animate(){requestAnimationFrame(animate);update(Math.min(clock.getDelta(),.05),performance.now())}animate();
    addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
  </script>
</body>
</html>
